# ACE Stack Preset — Next.js + FastAPI + PostgreSQL
# 이 프리셋은 ace init --stack nextjs-fastapi-pg 시 로딩된다.

name: nextjs-fastapi-pg
description: Next.js 14+ (App Router) + FastAPI + PostgreSQL 풀스택

backend:
  framework: fastapi
  language: python
  version: "3.10+"
  conventions: conv-backend.md

frontend:
  framework: nextjs
  language: typescript
  version: "14+"
  conventions: conv-frontend.md

db:
  engine: postgresql
  version: "15+"
  conventions: conv-db.md

# 공통 컨벤션 (모든 스택에서 core/에서 로딩)
# conv-common.md, conv-security.md 는 core/ 레벨에서 제공

ports:
  frontend: 3000
  backend: 8000
  db: 5432

infra:
  container: docker-compose
  storage: cloudflare-r2  # 선택적
